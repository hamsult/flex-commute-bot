version: "3.9"

services:
  flex-monitor:
    build: .
    container_name: flex-slack-monitor
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Seoul
    volumes:
      - ./auth:/app/auth      # 세션 파일 (로컬에서 관리)
      - ./data:/app/data      # 상태 파일 영속화
    healthcheck:
      test: ["CMD", "python3", "-c", "import os; exit(0 if os.path.exists('/app/auth/session.json') else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
